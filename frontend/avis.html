<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avis Clients - Artiyaar</title>
  <meta name="description" content="Découvrez les avis et témoignages de nos clients sur les artisans d'Artiyaar.">

  <!-- CSS -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

  <!-- Header -->
  <header class="header">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
      <a href="index.html" class="logo">
        <img src="img/logo.jpg" alt="Artiyaar Logo" style="height: 100px; object-fit: contain;">
      </a>
      
      <nav class="main-nav desktop-nav" style="display: flex; gap: 2rem; align-items: center;">
        <a href="index.html" class="nav-link" style="font-weight: 500;">Accueil</a>
        <a href="services.html" class="nav-link" style="font-weight: 500;">Services</a>
        <a href="avis.html" class="nav-link" style="font-weight: 700; color: var(--primary-color);">Avis</a>
        <a href="contact.html" class="nav-link" style="font-weight: 500;">Contact</a>
      </nav>

      <div class="nav-links desktop-nav" id="auth-links" style="display: flex; gap: 1rem; align-items: center;">
        <!-- Injected by app.js -->
      </div>
    </div>
  </header>

  <main>
    <section class="hero-section" style="padding: var(--spacing-xl) 0;">
      <div class="container">
        <h1 class="hero-title" style="font-size: 2.5rem; margin-bottom: 1rem;">
          L'avis de nos <span class="text-primary">Clients</span>
        </h1>
        <p class="hero-subtitle text-muted">Ce qu'ils pensent des artisans d'Artiyaar.</p>
      </div>
    </section>

    <section class="container" style="padding: var(--spacing-2xl) 0;">
      <div id="reviews-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem;">
        <!-- Les avis réels de la base de données seront injectés ici par reviews.js -->
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-content" style="display: flex; flex-direction: column; align-items: center; text-align: center; gap: 1rem; width: 100%;">
        <p class="text-muted" style="margin: 0;">Connecter les artisans, valoriser le savoir-faire local.</p>
        <div class="footer-links" style="display: flex; justify-content: center; gap: 1.5rem;">
          <a href="#" class="text-muted">À propos</a>
        </div>
      </div>
      <div class="footer-bottom text-muted">
        &copy; 2026 Artiyaar by LogiCode
      </div>
    </div>
  </footer>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- JS -->
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/reviews.js"></script>
<nav class="mobile-bottom-nav">
    <a href="index.html" class="bottom-nav-item ">
      <i class="fas fa-home"></i>
      <span>Accueil</span>
    </a>
    <a href="services.html" class="bottom-nav-item ">
      <i class="fas fa-search"></i>
      <span>Services</span>
    </a>
    <a href="avis.html" class="bottom-nav-item active">
      <i class="fas fa-star"></i>
      <span>Avis</span>
    </a>
    <a href="contact.html" class="bottom-nav-item ">
      <i class="fas fa-envelope"></i>
      <span>Contact</span>
    </a>
    <a href="login.html" class="bottom-nav-item   " id="mobile-auth-link">
      <i class="fas fa-user"></i>
      <span>Profil</span>
    </a>
  </nav>
</body>

</html>
