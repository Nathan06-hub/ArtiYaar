<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion / Inscription - Artiyaar</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">

  <div class="auth-container">
    <a href="index.html" class="logo mb-4" style="justify-content: center; display: flex; align-items: center;">
      <img src="img/logo.jpg" alt="Artiyaar Logo" style="height: 120px; object-fit: contain;">
    </a>
    
    <div class="card auth-card glass-panel">
      <div class="auth-toggle">
        <button class="auth-toggle-btn active" id="btn-login-tab" onclick="AuthUI.switchTab('login')">Connexion</button>
        <button class="auth-toggle-btn" id="btn-register-tab" onclick="AuthUI.switchTab('register')">S'inscrire</button>
      </div>

      <!-- Login Form -->
      <form id="login-form" onsubmit="AuthUI.handleLogin(event)">
        <h2 class="auth-header">Bon retour parmi nous !</h2>
        
        <div class="form-group">
          <label class="form-label" for="login-email">Email</label>
          <input type="email" id="login-email" class="form-control" placeholder="artisan@exemple.com" required>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="login-password">Mot de passe</label>
          <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
        </div>
        
        <div id="login-error" class="form-error">Identifiants incorrects.</div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          Se connecter
        </button>
        
        <div class="text-center mt-2">
          <a href="#" class="text-muted" style="font-size: 0.9rem;" onclick="AuthUI.forgotPassword(event)">Mot de passe oublié ?</a>
        </div>
      </form>

      <!-- Register Form -->
      <form id="register-form" class="hidden" onsubmit="AuthUI.handleRegister(event)">
        <h2 class="auth-header">Rejoignez la communauté</h2>
        
        <div class="form-group">
          <label class="form-label" for="reg-name">Nom complet</label>
          <input type="text" id="reg-name" class="form-control" placeholder="Issouf Kaboré" required>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="reg-email">Email</label>
          <input type="email" id="reg-email" class="form-control" placeholder="email@exemple.com" required>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="reg-password">Mot de passe</label>
          <input type="password" id="reg-password" class="form-control" placeholder="••••••••" required minlength="6">
        </div>

        <div class="form-group">
          <label class="form-label">Je suis :</label>
          <div style="display: flex; gap: 1rem; margin-top: 0.5rem;">
            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
              <input type="radio" name="reg-role" value="client" checked> Un Client
            </label>
            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
              <input type="radio" name="reg-role" value="artisan"> Un Artisan
            </label>
          </div>
        </div>
        
        <div id="register-error" class="form-error">Cet email est déjà utilisé.</div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          Créer mon compte
        </button>
      </form>
    </div>
  </div>

  <!-- JS -->
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
<nav class="mobile-bottom-nav">
    <a href="index.html" class="bottom-nav-item ">
      <i class="fas fa-home"></i>
      <span>Accueil</span>
    </a>
    <a href="services.html" class="bottom-nav-item ">
      <i class="fas fa-search"></i>
      <span>Services</span>
    </a>
    <a href="avis.html" class="bottom-nav-item ">
      <i class="fas fa-star"></i>
      <span>Avis</span>
    </a>
    <a href="contact.html" class="bottom-nav-item ">
      <i class="fas fa-envelope"></i>
      <span>Contact</span>
    </a>
    <a href="login.html" class="bottom-nav-item  active " id="mobile-auth-link">
      <i class="fas fa-user"></i>
      <span>Profil</span>
    </a>
  </nav>
</body>
</html>
